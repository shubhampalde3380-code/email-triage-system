name: email-triage-env
version: "1.0.0"
description: "Multi-task email triage environment for RL agents"
author: "Shubham Palde"

environment:
  entry_point: environment:app
  api_port: 7860

observation_space:
  type: object
  properties:
    email_id: {type: string}
    subject: {type: string}
    body: {type: string}
    sender: {type: string}
    timestamp: {type: string}

action_space:
  type: object
  properties:
    category:
      type: string
      enum: [urgent, billing, bug_report, spam, general]
    priority:
      type: integer
      minimum: 1
      maximum: 5
    route_to:
      type: string
      enum: [support, billing_team, engineering, spam_filter]

tasks:
  - id: task_1_classify
    name: "Email Classification"
    difficulty: easy
    max_steps: 50
    reward_range: [0.0, 1.0]

  - id: task_2_priority
    name: "Priority Scoring"
    difficulty: medium
    max_steps: 50
    reward_range: [0.0, 1.0]

  - id: task_3_full_triage
    name: "Full Triage Pipeline"
    difficulty: hard
    max_steps: 50
    reward_range: [0.0, 1.0]
